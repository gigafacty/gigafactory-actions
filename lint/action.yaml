name: "Lint"
description: "Run stack-aware linting based on project language"

inputs:
  language:
    description: "Programming language"
    required: true

runs:
  using: "composite"
  steps:
    - name: Lint Go
      if: inputs.language == 'go'
      shell: bash
      run: |
        if command -v golangci-lint &>/dev/null; then
          golangci-lint run
        else
          echo "::warning::golangci-lint not installed — skipping"
          go vet ./...
        fi

    - name: Lint TypeScript/JavaScript
      if: contains(fromJSON('["typescript","javascript"]'), inputs.language)
      shell: bash
      run: |
        if [ -f "package.json" ] && grep -q '"lint"' package.json; then
          npm run lint
        elif npx eslint --version &>/dev/null 2>&1; then
          npx eslint . --ext .ts,.tsx,.js,.jsx
        else
          echo "::warning::No linter configured — skipping"
        fi

    - name: Lint Python
      if: inputs.language == 'python'
      shell: bash
      run: |
        if command -v ruff &>/dev/null; then
          ruff check .
        elif pip show flake8 &>/dev/null 2>&1; then
          flake8 .
        else
          echo "::warning::No Python linter configured — skipping"
        fi
